<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Security Pro V16 - Elite</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
    <style>
        :root { 
            --neon: #00ff88; 
            --danger: #ff3b30;
            --glass: rgba(15, 15, 15, 0.8); 
            --border: rgba(255, 255, 255, 0.15);
        }
        body { margin: 0; background: #000; color: white; font-family: -apple-system, system-ui, sans-serif; overflow: hidden; }
        
        #view-container { position: relative; width: 100vw; height: 60vh; background: #000; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; transition: filter 0.3s; }
        canvas#overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5; }

        /* HUD Custom Icons */
        .hud {
            position: absolute; top: 20px; left: 20px; right: 20px;
            display: flex; justify-content: space-between; z-index: 10;
        }
        .badge { 
            background: var(--glass); padding: 8px 14px; border-radius: 10px; 
            font-size: 11px; font-weight: 600; letter-spacing: 1px;
            backdrop-filter: blur(15px); border: 1px solid var(--border);
        }

        /* Mode Selector Custom SVG */
        .mode-selector {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 20px; z-index: 20; background: var(--glass);
            padding: 10px 25px; border-radius: 40px; backdrop-filter: blur(20px);
            border: 1px solid var(--border);
        }
        .mode-btn {
            background: none; border: none; fill: #888; cursor: pointer; 
            transition: 0.3s; display: flex; flex-direction: column; align-items: center; gap: 5px;
        }
        .mode-btn.active { fill: var(--neon); transform: scale(1.1); }
        .mode-btn span { font-size: 7px; color: white; text-transform: uppercase; font-weight: bold; }
        .mode-btn svg { width: 22px; height: 22px; }

        /* Control Panel */
        .ui-panel {
            height: 40vh; background: #000; display: flex; 
            flex-direction: column; align-items: center; padding-top: 25px;
        }
        .status-txt { font-size: 10px; color: var(--neon); margin-bottom: 20px; font-weight: bold; letter-spacing: 2px; }
        
        .main-controls { display: flex; gap: 15px; margin-bottom: 20px; }
        .btn-ios {
            background: white; color: black; border: none;
            padding: 14px 28px; border-radius: 25px; font-weight: 700;
            font-size: 12px; letter-spacing: 0.5px; transition: 0.3s;
        }
        .btn-ios.active-sensor { background: var(--danger); color: white; }
        .btn-secondary {
            background: #1a1a1a; color: white; border: 1px solid #333;
            padding: 14px 20px; border-radius: 25px; font-size: 11px;
        }
        .btn-secondary.on { border-color: #007aff; color: #007aff; }

        #gallery {
            width: 100%; height: 85px; display: flex; 
            padding: 0 20px; gap: 10px; overflow-x: auto; box-sizing: border-box;
        }
        .captured-img { height: 75px; border-radius: 8px; border: 1px solid #222; }

        /* Tamper Alert */
        #tamper-alert {
            position: absolute; inset: 0; background: rgba(255, 59, 48, 0.2);
            display: none; flex-direction: column; align-items: center; justify-content: center;
            z-index: 30; backdrop-filter: blur(8px);
        }

        /* Filter Modes */
        .f-night { filter: brightness(1.6) contrast(1.2) sepia(1) hue-rotate(90deg); }
        .f-thermal { filter: contrast(2) saturate(5) hue-rotate(240deg); }
        .f-mono { filter: grayscale(1) contrast(1.2); }
    </style>
</head>
<body>

    <div id="view-container">
        <div class="hud">
            <div id="clock-txt" class="badge">00:00</div>
            <div id="info-mode" class="badge" style="color: var(--neon);">SYSTEM ACTIVE</div>
        </div>

        <div class="mode-selector">
            <button class="mode-btn active" onclick="changeMode('std', this)">
                <svg viewBox="0 0 24 24"><path d="M12 8c-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4-1.79-4-4-4zm8.94 3c-.46-4.17-3.77-7.48-7.94-7.94V1h-2v2.06C6.83 3.52 3.52 6.83 3.06 11H1v2h2.06c.46 4.17 3.77 7.48 7.94 7.94V23h2v-2.06c4.17-.46 7.48-3.77 7.94-7.94H23v-2h-2.06zM12 19c-3.87 0-7-3.13-7-7s3.13-7 7-7 7 3.13 7 7-3.13 7-7 7z"/></svg>
                <span>Standard</span>
            </button>
            <button class="mode-btn" onclick="changeMode('night', this)">
                <svg viewBox="0 0 24 24"><path d="M10 2c-1.82 0-3.53.5-5 1.35C7.99 5.08 10 8.3 10 12s-2.01 6.92-5 8.65C6.47 21.5 8.18 22 10 22c5.52 0 10-4.48 10-10S15.52 2 10 2z"/></svg>
                <span>Night</span>
            </button>
            <button class="mode-btn" onclick="changeMode('thermal', this)">
                <svg viewBox="0 0 24 24"><path d="M17 15.58V5c0-2.76-2.24-5-5-5S7 2.24 7 5v10.58c-1.79 1.3-3 3.41-3 5.79 0 3.97 3.13 7.13 7.11 7.13 3.96 0 7.11-3.13 7.11-7.13 0-2.38-1.21-4.49-3.11-5.79zM12 3c1.1 0 2 .9 2 2v6h-4V5c0-1.1.9-2 2-2z"/></svg>
                <span>Thermal</span>
            </button>
        </div>
        
        <div id="tamper-alert">
            <h2 style="margin:0; font-size: 22px; letter-spacing: 2px;">⚠️ TAMPER</h2>
            <p style="margin:5px 0; font-size: 11px;">SENSOR OBSTRUCTED</p>
        </div>

        <video id="webcam" autoplay playsinline muted></video>
        <canvas id="overlay"></canvas>
    </div>

    <div class="ui-panel">
        <div id="target-info" class="status-txt">READY TO SCAN</div>
        <div class="main-controls">
            <button id="toggleBtn" class="btn-ios">START SENSOR</button>
            <button id="autoPhotoBtn" class="btn-secondary on">AUTO PHOTO: ON</button>
        </div>
        <div id="gallery"></div>
    </div>

    <script>
        const video = document.getElementById('webcam');
        const overlay = document.getElementById('overlay');
        const ctx = overlay.getContext('2d');
        const toggleBtn = document.getElementById('toggleBtn');
        const autoPhotoBtn = document.getElementById('autoPhotoBtn');
        const targetInfo = document.getElementById('target-info');
        const gallery = document.getElementById('gallery');
        const tamperUI = document.getElementById('tamper-alert');

        let isTracking = false, lastFrame = null, canCapture = true;
        let isAutoOn = true;
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let osc = null;

        // Jam iOS style
        setInterval(() => {
            const now = new Date();
            document.getElementById('clock-txt').innerText = now.toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
        }, 1000);

        function changeMode(mode, btn) {
            video.className = '';
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            if(mode === 'night') video.classList.add('f-night');
            if(mode === 'thermal') video.classList.add('f-thermal');
            if(mode === 'mono') video.classList.add('f-mono');
        }

        async function init() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                video.srcObject = stream;
                video.onloadedmetadata = () => {
                    overlay.width = video.videoWidth;
                    overlay.height = video.videoHeight;
                };
            } catch (err) { targetInfo.innerText = "CAMERA ERROR"; }
        }

        function playAlarm(active, type) {
            if (active) {
                if (osc) return;
                osc = audioCtx.createOscillator();
                const g = audioCtx.createGain();
                osc.type = (type === 'tamper') ? 'square' : 'sine';
                osc.frequency.value = (type === 'tamper') ? 400 : 1000;
                g.gain.value = 0.03;
                osc.connect(g); g.connect(audioCtx.destination);
                osc.start();
            } else { if (osc) { osc.stop(); osc = null; } }
        }

        function takePhoto() {
            if (!canCapture || !isAutoOn) return;
            canCapture = false;

            const snap = document.createElement('canvas');
            snap.width = video.videoWidth; snap.height = video.videoHeight;
            const sCtx = snap.getContext('2d');
            sCtx.filter = getComputedStyle(video).filter;
            sCtx.drawImage(video, 0, 0);

            const img = new Image();
            img.src = snap.toDataURL('image/jpeg');
            img.className = 'captured-img';
            gallery.prepend(img);

            setTimeout(() => { canCapture = true; }, 4000);
        }

        // Kembalikan ke Logika Awal yang Responsif
        function sensorProcess() {
            if (!isTracking) return;

            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = 60; tempCanvas.height = 45;
            const tCtx = tempCanvas.getContext('2d');
            tCtx.drawImage(video, 0, 0, 60, 45);
            const pixels = tCtx.getImageData(0,0,60,45).data;

            let totalBright = 0;
            for (let i = 0; i < pixels.length; i += 4) {
                totalBright += (pixels[i] + pixels[i+1] + pixels[i+2]) / 3;
            }
            let avg = totalBright / (pixels.length / 4);

            if (avg < 7) {
                tamperUI.style.display = 'flex';
                playAlarm(true, 'tamper');
                targetInfo.innerText = "LENS COVERED";
            } else {
                tamperUI.style.display = 'none';
                if (lastFrame) {
                    let diff = 0;
                    let minX=60, maxX=0, minY=45, maxY=0;
                    for (let i = 0; i < pixels.length; i += 4) {
                        // Sensitivitas awal (40)
                        if (Math.abs(pixels[i] - lastFrame[i]) > 40) {
                            diff++;
                            let x=(i/4)%60; let y=Math.floor((i/4)/60);
                            if(x<minX) minX=x; if(x>maxX) maxX=x;
                            if(y<minY) minY=y; if(y>maxY) maxY=y;
                        }
                    }

                    if (diff > 25) { // Threshold deteksi awal
                        playAlarm(true, 'normal');
                        targetInfo.innerText = "MOTION DETECTED!";
                        
                        const sx = overlay.width/60; const sy = overlay.height/45;
                        ctx.clearRect(0,0,overlay.width, overlay.height);
                        ctx.strokeStyle = "#00ff88"; 
                        ctx.lineWidth = 3;
                        // Kotak tanpa animasi delay (langsung snap ke target)
                        ctx.strokeRect(minX*sx, minY*sy, (maxX-minX)*sx, (maxY-minY)*sy);
                        
                        takePhoto();
                    } else {
                        playAlarm(false);
                        ctx.clearRect(0,0,overlay.width, overlay.height);
                        targetInfo.innerText = "SCANNING...";
                    }
                }
            }
            lastFrame = pixels;
            requestAnimationFrame(sensorProcess);
        }

        toggleBtn.onclick = () => {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            isTracking = !isTracking;
            toggleBtn.innerText = isTracking ? "STOP SENSOR" : "START SENSOR";
            toggleBtn.classList.toggle('active-sensor', isTracking);
            if (isTracking) sensorProcess();
        };

        autoPhotoBtn.onclick = () => {
            isAutoOn = !isAutoOn;
            autoPhotoBtn.innerText = `AUTO PHOTO: ${isAutoOn ? 'ON' : 'OFF'}`;
            autoPhotoBtn.classList.toggle('on', isAutoOn);
        };

        init();
    </script>
</body>
</html>
